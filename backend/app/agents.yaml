# Per-method LLM configuration for ClaudeClient.
#
# Each entry maps a method name to its model, token budget, and (optional)
# fallback model. claude.py reads this at import time; missing entries fall
# back to safe hardcoded defaults so the bot keeps working even if the YAML
# is malformed or absent.
#
# Why this exists: keeps model choice, token limits, and fallback wiring
# declarative — we can change to haiku for the catalog matcher or bump
# max_tokens on persona extraction without touching Python.
#
# Conventions:
#   model         : full Anthropic model ID
#   max_tokens    : response cap (Anthropic-side)
#   fallback_model: used on stop_reason="refusal" or repeated transient errors
#   description   : short note explaining the method's role

defaults:
  model: claude-sonnet-4-20250514
  max_tokens: 1024
  fallback_model: claude-3-5-sonnet-20241022

agents:
  decide:
    description: Negotiation action chooser — returns JSON action + price + intent.
    model: claude-sonnet-4-20250514
    max_tokens: 350
    fallback_model: claude-3-5-sonnet-20241022

  generate_reply:
    description: Hinglish reply writer driven by decide()'s chosen action.
    model: claude-sonnet-4-20250514
    max_tokens: 200
    fallback_model: claude-3-5-sonnet-20241022

  intent_classifier:
    description: Pre-decide haiku-based sentiment/intent/repeated-dissatisfaction classifier.
    model: claude-haiku-4-5-20251001
    max_tokens: 200

  generate_product_description:
    description: Catalog-onboarding helper — image -> short description.
    model: claude-sonnet-4-20250514
    max_tokens: 200

  describe_product_image:
    description: Stage 1 vision pass on a customer-sent product image.
    model: claude-sonnet-4-20250514
    max_tokens: 150

  match_product_by_description:
    description: Stage 2 catalog match — text-only.
    model: claude-sonnet-4-20250514
    max_tokens: 150

  suggest_category:
    description: One-shot category + tag suggestions during onboarding.
    model: claude-sonnet-4-20250514
    max_tokens: 400

  suggest_tags_for_category:
    description: Bulk tag suggestions for a known category.
    model: claude-sonnet-4-20250514
    max_tokens: 600

  extract_feature_query:
    description: Detects if customer message is a product-feature question and which tag it maps to.
    model: claude-sonnet-4-20250514
    max_tokens: 200

  extract_persona:
    description: Onboarding-time analyzer of seller conversation samples -> persona JSON.
    model: claude-sonnet-4-20250514
    max_tokens: 4000
