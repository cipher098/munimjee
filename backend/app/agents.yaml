# Per-method LLM configuration.
#
# Each entry maps a method name to its provider, model, token budget,
# and (optional) fallback. App-level only — sellers can override the
# customer-facing `decide` and `generate_reply` entries via the
# /dashboard/settings UI (Seller.llm_preferences). Subagent calls
# (intent_classifier, vision, catalog, etc.) are NEVER per-seller.
#
# Why this exists: keeps model + provider choice, token limits, and
# fallback wiring declarative — switch a method's model/provider without
# touching Python.
#
# Conventions:
#   provider          : "anthropic" | "sarvam"
#   model             : provider-specific model ID
#   max_tokens        : response cap (provider-side)
#   fallback_provider : provider used on failure (parse error / HTTP
#                       error / refusal). Omit to disable fallback.
#   fallback_model    : model used on fallback (paired with
#                       fallback_provider).
#
# Current policy: everything runs on Claude Haiku (claude-haiku-4-5).

defaults:
  provider: anthropic
  model: claude-sonnet-4-20250514
  max_tokens: 1024
  fallback_provider: anthropic
  fallback_model: claude-sonnet-4-20250514

agents:
  decide:
    description: Negotiation action chooser — returns JSON action + price + intent.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 700
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  generate_reply:
    description: Hinglish reply writer driven by decide()'s chosen action.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 200
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  intent_classifier:
    description: Pre-decide sentiment/intent/repeated-dissatisfaction classifier.
    provider: anthropic
    model: claude-haiku-4-5-20251001
    max_tokens: 200
    fallback_provider: anthropic
    fallback_model: claude-opus-4-8

  generate_product_description:
    description: Catalog-onboarding helper — image -> short description.
    provider: anthropic
    model: claude-opus-4-8
    max_tokens: 200
    fallback_provider: anthropic
    fallback_model: claude-opus-4-8

  describe_product_image:
    description: Stage 1 vision pass on a customer-sent product image.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 150
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  extract_payment_details:
    description: Vision — extract UPI payment fields (payee, amount, datetime, UTR) from a screenshot.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 300
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  classify_image_type:
    description: Vision — is a customer image a payment receipt or a product?
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 5
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  match_product_by_description:
    description: Stage 2 catalog match — text-only.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 400
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  suggest_category:
    description: One-shot category + tag suggestions during onboarding.
    provider: anthropic
    model: claude-opus-4-8
    max_tokens: 400
    fallback_provider: anthropic
    fallback_model: claude-opus-4-8

  suggest_tags_for_category:
    description: Bulk tag suggestions for a known category.
    provider: anthropic
    model: claude-opus-4-8
    max_tokens: 600
    fallback_provider: anthropic
    fallback_model: claude-opus-4-8

  extract_feature_query:
    description: Detects if customer message is a product-feature question and which tag it maps to.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 200
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514

  extract_persona:
    description: Onboarding-time analyzer of seller conversation samples -> persona JSON.
    provider: anthropic
    model: claude-sonnet-4-20250514
    max_tokens: 4000
    fallback_provider: anthropic
    fallback_model: claude-sonnet-4-20250514
