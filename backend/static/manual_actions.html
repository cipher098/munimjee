<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SellerBot — Manual Actions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }
    .topbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px;
              display: flex; align-items: center; gap: 16px; height: 56px; }
    .topbar h1 { font-size: 16px; font-weight: 700; }
    .topbar nav { display: flex; gap: 4px; margin-left: auto; }
    .topbar nav a { padding: 6px 12px; border-radius: 6px; font-size: 13px;
                    text-decoration: none; color: #555; }
    .topbar nav a:hover { background: #f3f4f6; }
    .topbar nav a.active { background: #ede9fe; color: #6366f1; font-weight: 600; }

    .layout { display: flex; gap: 16px; max-width: 1080px; margin: 24px auto; padding: 0 16px; }
    .col-list { flex: 0 0 380px; }
    .col-chat { flex: 1; min-width: 0; }
    .card { background: #fff; border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .card h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }

    .item { border: 1px solid #eee; border-radius: 10px; padding: 12px; margin-bottom: 10px;
            cursor: pointer; transition: border-color .15s; }
    .item:hover { border-color: #c7d2fe; }
    .item.sel { border-color: #6366f1; background: #f5f3ff; }
    .item .name { font-weight: 600; font-size: 14px; }
    .item .when { font-size: 11px; color: #9ca3af; }
    .item .detail { font-size: 12px; color: #6b7280; margin-top: 6px;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px;
           font-weight: 700; margin-top: 6px; }
    .tag.refund { background: #fef2f2; color: #b91c1c; }
    .tag.cancellation { background: #fff7ed; color: #c2410c; }
    .tag.item_change { background: #eff6ff; color: #1d4ed8; }
    .tag.other { background: #f1f5f9; color: #475569; }

    .empty { color: #9ca3af; font-size: 13px; padding: 16px 4px; }
    .chat { max-height: 70vh; overflow-y: auto; padding: 4px; }
    .msg { margin: 8px 0; display: flex; }
    .msg.customer { justify-content: flex-start; }
    .msg.bot, .msg.seller_manual { justify-content: flex-end; }
    .bubble { max-width: 75%; padding: 8px 11px; border-radius: 12px; font-size: 13px;
              white-space: pre-wrap; word-break: break-word; }
    .msg.customer .bubble { background: #f1f5f9; color: #1f2937; border-bottom-left-radius: 3px; }
    .msg.bot .bubble { background: #ede9fe; color: #3730a3; border-bottom-right-radius: 3px; }
    .msg.seller_manual .bubble { background: #dcfce7; color: #166534; border-bottom-right-radius: 3px; }
    .msg .ts { font-size: 10px; color: #b6bcc7; margin-top: 2px; }

    .chat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .btn { padding: 9px 14px; background: #16a34a; color: #fff; border: none;
           border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .banner { background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
              border-radius: 8px; padding: 8px 11px; font-size: 12px; margin-bottom: 12px; }
    .count { background: #ef4444; color: #fff; border-radius: 999px; font-size: 11px;
             padding: 1px 7px; margin-left: 6px; }
  </style>
</head>
<body>
<div class="topbar">
  <h1>munimjee.ai</h1>
  <nav>
    <a href="/dashboard">Add Product</a>
    <a href="/dashboard/products">All Products</a>
    <a href="/training/dashboard">Training</a>
    <a href="/dashboard/settings">Settings</a>
    <a href="/dashboard/manual-actions" class="active">Manual Actions</a>
    <a href="/dashboard/llm-costs">Costs</a>
    <a href="/dashboard-auth/logout">Logout</a>
  </nav>
</div>

<div class="layout">
  <div class="col-list">
    <div class="card">
      <h2>Needs your action <span id="count" class="count" style="display:none">0</span></h2>
      <div id="list"><div class="empty">Loading…</div></div>
    </div>
  </div>
  <div class="col-chat">
    <div class="card">
      <div id="chat-wrap"><div class="empty">Select a chat on the left to review it.</div></div>
    </div>
  </div>
</div>

<script>
let SELECTED = null;
let ITEMS = [];

function esc(s) { return (s || "").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function when(iso) { if (!iso) return ""; const d = new Date(iso); return d.toLocaleString(); }

async function loadList() {
  const res = await fetch('/manual-actions');
  if (!res.ok) { document.getElementById('list').innerHTML = '<div class="empty">Failed to load.</div>'; return; }
  ITEMS = await res.json();
  const el = document.getElementById('list');
  const cnt = document.getElementById('count');
  if (!ITEMS.length) {
    el.innerHTML = '<div class="empty">All clear — nothing needs manual action. 🎉</div>';
    cnt.style.display = 'none';
    return;
  }
  cnt.style.display = 'inline-block'; cnt.textContent = ITEMS.length;
  el.innerHTML = ITEMS.map(a => `
    <div class="item ${a.id === SELECTED ? 'sel' : ''}" onclick="openChat('${a.id}')">
      <div class="name">${esc(a.customer_name)}</div>
      <div class="when">${when(a.created_at)}</div>
      <span class="tag ${a.kind}">${esc(a.kind_label)}</span>
      <div class="detail">${esc(a.detail || '')}</div>
    </div>`).join('');
}

async function openChat(id) {
  SELECTED = id;
  loadList();
  const wrap = document.getElementById('chat-wrap');
  wrap.innerHTML = '<div class="empty">Loading chat…</div>';
  const res = await fetch('/manual-actions/' + id + '/chat');
  if (!res.ok) { wrap.innerHTML = '<div class="empty">Failed to load chat.</div>'; return; }
  const c = await res.json();
  const msgs = (c.messages || []).map(m => `
    <div class="msg ${m.role}">
      <div>
        <div class="bubble">${esc(m.content)}</div>
        <div class="ts">${when(m.timestamp)}</div>
      </div>
    </div>`).join('');
  wrap.innerHTML = `
    <div class="chat-head">
      <div><b>${esc(c.customer_name)}</b> · <span class="tag ${c.kind}">${esc(c.kind_label)}</span></div>
      <button class="btn" id="resolveBtn" onclick="resolve('${c.id}')">Mark resolved</button>
    </div>
    <div class="banner">Bot is paused on this chat. Handle the ${esc(c.kind_label.toLowerCase())} with the customer, then mark it resolved to let the bot resume.</div>
    <div class="chat">${msgs || '<div class="empty">No messages.</div>'}</div>`;
  const chat = wrap.querySelector('.chat');
  if (chat) chat.scrollTop = chat.scrollHeight;
}

async function resolve(id) {
  const btn = document.getElementById('resolveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Resolving…'; }
  const res = await fetch('/manual-actions/' + id + '/resolve', { method: 'POST' });
  if (!res.ok) { if (btn) { btn.disabled = false; btn.textContent = 'Mark resolved'; } return; }
  SELECTED = null;
  document.getElementById('chat-wrap').innerHTML = '<div class="empty">Resolved ✓ — bot resumed. Select another chat.</div>';
  loadList();
}

loadList();
setInterval(loadList, 20000);
</script>
</body>
</html>
